<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전자계약 포털</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f7;--surface:#fff;--border:#e2e5ea;--focus:#4a7cdc;
  --text:#1a1d23;--sub:#6b7280;--hint:#9ca3af;
  --primary:#1e50c8;--primary-h:#1840a8;--danger:#dc2626;
  --success-bg:#ecfdf5;--success-bd:#6ee7b7;--success-tx:#065f46;
  --error-bg:#fef2f2;--error-bd:#fca5a5;--error-tx:#991b1b;
  --legal-bg:#eff6ff;--legal-tx:#1d4ed8;--legal-bd:#bfdbfe;
  --finance-bg:#f0fdf4;--finance-tx:#15803d;--finance-bd:#bbf7d0;
  --hr-bg:#fdf4ff;--hr-tx:#7e22ce;--hr-bd:#e9d5ff;
  --r:8px;--rl:12px;
}
html,body{font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.logo{font-size:16px;font-weight:700}.logo span{color:var(--primary)}
.tab-nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px}
.tab-btn{padding:14px 20px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--sub);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:inherit}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.page{display:none;padding:24px;max-width:960px;margin:0 auto}.page.active{display:block}
.section{margin-bottom:16px}
.section-label{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;padding-left:2px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;font-weight:500;color:var(--sub)}
.field input,.field select{padding:9px 12px;font-size:13px;font-family:inherit;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--focus);box-shadow:0 0 0 3px rgba(74,124,220,.12)}
.field input[readonly]{background:var(--bg);color:var(--sub);cursor:default}
.req{color:var(--danger);font-size:11px}
.checkbox-row{display:flex;gap:20px;margin-top:8px;flex-wrap:wrap}
.cb-item{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;font-weight:500}
.cb-item input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--primary)}
.cb-item.legal{color:var(--legal-tx)}.cb-item.finance{color:var(--finance-tx)}.cb-item.hr{color:var(--hr-tx)}
.btn-primary{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-primary:hover{background:var(--primary-h)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-sm{padding:6px 12px;font-size:12px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);cursor:pointer;color:var(--text);font-family:inherit}
.btn-sm:hover{background:var(--bg)}
.btn-blue{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-blue:hover{background:var(--primary-h)}
.alert{padding:11px 14px;border-radius:var(--r);font-size:13px;margin-bottom:16px;display:none}
.alert-success{background:var(--success-bg);border:1px solid var(--success-bd);color:var(--success-tx)}
.alert-error{background:var(--error-bg);border:1px solid var(--error-bd);color:var(--error-tx)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-legal{background:var(--legal-bg);color:var(--legal-tx);border:1px solid var(--legal-bd)}
.badge-finance{background:var(--finance-bg);color:var(--finance-tx);border:1px solid var(--finance-bd)}
.badge-hr{background:var(--hr-bg);color:var(--hr-tx);border:1px solid var(--hr-bd)}
.badge-admin{background:#1e293b;color:#fff}

/* 로그인 오버레이 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.overlay.hidden{display:none}
.pin-card{background:var(--surface);border-radius:var(--rl);padding:32px 28px;width:340px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.pin-card h3{font-size:17px;font-weight:700;margin-bottom:6px}
.pin-card p{font-size:13px;color:var(--sub);margin-bottom:20px}
.dept-btn-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.dept-login-btn{padding:11px;font-size:13px;font-weight:500;border-radius:var(--r);border:1px solid;cursor:pointer;font-family:inherit;transition:all .15s}
.dept-login-btn.legal{background:var(--legal-bg);color:var(--legal-tx);border-color:var(--legal-bd)}
.dept-login-btn.finance{background:var(--finance-bg);color:var(--finance-tx);border-color:var(--finance-bd)}
.dept-login-btn.hr{background:var(--hr-bg);color:var(--hr-tx);border-color:var(--hr-bd)}
.dept-login-btn.admin{background:#1e293b;color:#fff;border-color:#1e293b}
.pin-input{width:100%;padding:12px;font-size:20px;text-align:center;letter-spacing:.4em;border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;font-family:inherit;outline:none}
.pin-input:focus{border-color:var(--focus)}
.pin-confirm{width:100%;padding:10px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.pin-error{color:var(--danger);font-size:12px;margin-top:8px;min-height:18px}
.back-btn{background:none;border:none;color:var(--sub);cursor:pointer;font-size:13px;margin-top:8px;font-family:inherit}

/* 통계 */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px}
.stat-label{font-size:11px;color:var(--sub);margin-bottom:4px;font-weight:500}
.stat-value{font-size:24px;font-weight:700}

/* 탭필터 */
.contract-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.contract-tab{padding:5px 12px;font-size:12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--sub);font-family:inherit}
.contract-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* 필터 */
.filter-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 18px;margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-label{font-size:11px;color:var(--sub);font-weight:500}
.filter-wrap select,.filter-wrap input{padding:6px 10px;font-size:12px;border:1px solid var(--border);border-radius:var(--r);font-family:inherit;outline:none;background:var(--surface);color:var(--text)}

/* 테이블 */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:800px}
thead tr{background:var(--bg);border-bottom:2px solid var(--border)}
th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--sub);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f8faff}
td{padding:10px 12px;vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.status-select{font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid;cursor:pointer;font-family:inherit;font-weight:500;outline:none}
.status-발송요청{background:#fef9c3;color:#854d0e;border-color:#fde047}
.status-발송완료{background:var(--legal-bg);color:var(--legal-tx);border-color:var(--legal-bd)}
.status-체결완료{background:var(--success-bg);color:var(--success-tx);border-color:var(--success-bd)}
.empty-state{padding:48px;text-align:center;color:var(--hint)}
.loading-state{padding:48px;text-align:center;color:var(--sub)}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border-radius:var(--rl);padding:28px;width:580px;max-width:92vw;max-height:85vh;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:15px;font-weight:700}
.modal-close{border:none;background:none;cursor:pointer;font-size:22px;color:var(--sub);line-height:1}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.detail-item{display:flex;flex-direction:column;gap:3px}
.detail-label{font-size:11px;color:var(--sub);font-weight:500}
.detail-value{font-size:12px;padding:6px 10px;background:var(--bg);border-radius:var(--r);color:var(--text)}
</style>
</head>
<body>

<div class="header">
  <div class="logo">전자계약 <span>포털</span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="header-badge" style="display:none" class="badge"></span>
    <button class="btn-sm" id="logout-btn" style="display:none" onclick="logout()">로그아웃</button>
  </div>
</div>

<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('request')">📄 계약 요청</button>
  <button class="tab-btn" onclick="switchTab('history')">📋 이력 조회</button>
</div>

<!-- PIN 로그인 오버레이 -->
<div class="overlay hidden" id="pin-overlay">
  <div class="pin-card">
    <div style="font-size:32px;margin-bottom:12px">🔐</div>
    <h3>이력 조회</h3>
    <p id="pin-desc">부서를 선택해 주세요</p>
    <div class="dept-btn-wrap" id="dept-btns">
      <button class="dept-login-btn legal" onclick="selectDept('법무')">⚖️ 법무팀</button>
      <button class="dept-login-btn finance" onclick="selectDept('자금·회계')">💰 자금·회계팀</button>
      <button class="dept-login-btn hr" onclick="selectDept('인사')">👥 인사팀</button>
      <button class="dept-login-btn admin" onclick="selectDept('전체관리자')">🛡️ 전체 관리자</button>
    </div>
    <div id="pin-input-wrap" style="display:none">
      <input class="pin-input" type="password" id="pin-input" maxlength="6" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="pin-confirm" onclick="doLogin()">확인</button>
      <div class="pin-error" id="pin-error"></div>
      <button class="back-btn" onclick="backToDept()">← 부서 선택으로</button>
    </div>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">상세 정보</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body" class="detail-grid"></div>
  </div>
</div>

<!-- ① 계약 요청 페이지 -->
<div class="page active" id="page-request">
  <div id="alert-success" class="alert alert-success">✅ 요청이 성공적으로 제출되었습니다! 담당 부서에서 확인 후 처리합니다.</div>
  <div id="alert-error" class="alert alert-error">⚠️ <span id="error-text"></span></div>

  <div class="section">
    <div class="section-label">요청 대상 및 계약서 종류</div>
    <div class="card">
      <div class="field" style="margin-bottom:16px">
        <label>검토 요청 부서 <span class="req">*</span></label>
        <div class="checkbox-row">
          <label class="cb-item legal"><input type="checkbox" id="cb-legal" value="법무"> 법무</label>
          <label class="cb-item finance"><input type="checkbox" id="cb-finance" value="자금·회계"> 자금·회계</label>
          <label class="cb-item hr"><input type="checkbox" id="cb-hr" value="인사"> 인사</label>
        </div>
      </div>
      <div class="field">
        <label>계약서 종류 <span class="req">*</span></label>
        <select id="contract-type" onchange="updateFields()">
          <option value="">-- 계약서 종류를 선택하세요 --</option>
          <option value="1">물품공급계약서 (기본)</option>
          <option value="2">물품공급계약서 (기타여신)</option>
          <option value="3">프로젝트약정서 (기본)</option>
          <option value="4">프로젝트약정서 직납 (EU)</option>
          <option value="5">물류위탁계약서</option>
          <option value="6">보세창고 용역계약서</option>
          <option value="7">판매장려금 약정서</option>
          <option value="8">판촉비지원 약정서</option>
          <option value="9">장려금 확인서</option>
          <option value="10">지원금 확인서</option>
        </select>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">요청자 정보</div>
    <div class="card">
      <div class="grid2">
        <div class="field"><label>요청자 성명 <span class="req">*</span></label><input type="text" id="req-name" placeholder="홍길동"></div>
        <div class="field"><label>부서 <span class="req">*</span></label><input type="text" id="req-dept" placeholder="영업1팀"></div>
      </div>
      <div style="margin-top:12px"><div class="field" style="max-width:200px"><label>제출일</label><input type="text" id="req-date" readonly></div></div>
    </div>
  </div>

  <div class="section" id="contract-section" style="display:none">
    <div class="section-label" id="contract-section-title">계약 정보</div>
    <div class="card"><div class="grid2" id="dynamic-fields"></div></div>
  </div>

  <div class="section" id="attach-section" style="display:none">
    <div class="card" style="background:#fffbeb;border-color:#fcd34d;display:flex;align-items:flex-start;gap:12px">
      <span style="font-size:20px;flex-shrink:0">📎</span>
      <div>
        <div style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:4px">첨부파일 안내</div>
        <div style="font-size:13px;color:#78350f;line-height:1.6">
          관련 파일 (<span id="attach-guide-text" style="font-weight:700">견적서, 계약 조건 등</span>)이 있는 경우, 담당 부서에 별도로 이메일로 전달해 주세요.
        </div>
      </div>
    </div>
  </div>

  <div style="padding-bottom:32px">
    <button class="btn-primary" id="submit-btn" onclick="submitRequest()">요청 제출 →</button>
  </div>
</div>

<!-- ② 이력 조회 페이지 -->
<div class="page" id="page-history">
  <div id="history-content" style="display:none">
    <div class="stats">
      <div class="stat-card"><div class="stat-label">전체 요청</div><div class="stat-value" id="stat-total">-</div></div>
      <div class="stat-card"><div class="stat-label">발송요청</div><div class="stat-value" id="stat-s1" style="color:#854d0e">-</div></div>
      <div class="stat-card"><div class="stat-label">발송완료</div><div class="stat-value" id="stat-s2" style="color:var(--legal-tx)">-</div></div>
      <div class="stat-card"><div class="stat-label">체결완료</div><div class="stat-value" id="stat-s3" style="color:var(--success-tx)">-</div></div>
    </div>

    <div class="contract-tabs" id="contract-tabs"></div>

    <div class="filter-wrap">
      <div class="filter-group">
        <div class="filter-label">현재상태</div>
        <select id="f-status" onchange="applyFilter()">
          <option value="">전체</option>
          <option>발송요청</option><option>발송완료</option><option>체결완료</option>
        </select>
      </div>
      <div class="filter-group">
        <div class="filter-label">요청자</div>
        <input type="text" id="f-name" placeholder="이름 검색" oninput="applyFilter()" style="width:110px">
      </div>
      <div class="filter-group">
        <div class="filter-label">거래처명</div>
        <input type="text" id="f-company" placeholder="거래처 검색" oninput="applyFilter()" style="width:130px">
      </div>
      <button class="btn-sm" onclick="resetFilter()" style="align-self:flex-end">초기화</button>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:15px;font-weight:700">요청 이력</span>
        <span id="result-count" style="font-size:12px;color:var(--sub)"></span>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-sm btn-blue" onclick="exportSelected()">☑️ 선택 엑셀 출력</button>
        <button class="btn-sm" onclick="exportAll()">📊 전체 엑셀 출력</button>
        <button class="btn-sm" onclick="deleteSelected()" style="color:var(--danger);border-color:#fca5a5">🗑 선택 삭제</button>
        <button class="btn-sm" onclick="loadData()">🔄 새로고침</button>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th style="width:36px;text-align:center"><input type="checkbox" id="chk-all" onclick="toggleAll(this)" style="cursor:pointer;accent-color:var(--primary)"></th>
            <th>요청일시</th><th>요청자</th><th>요청부서</th><th>검토요청부서</th>
            <th>계약서 종류</th><th>거래처명</th><th>서명자명</th><th>현재상태</th><th>상세</th>
          </tr></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div class="loading-state" id="loading-state">데이터를 불러오는 중...</div>
      <div class="empty-state" id="empty-state" style="display:none">📭 조회된 이력이 없습니다</div>
    </div>
  </div>
</div>

<script>
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxAMJfvfBs_IberixDPkJKsKvwmLNAa1fwxEU8lPMxmMwKUj2Zk5KeZ4njFbDQgevam/exec';

const ATTACH_GUIDE = {
  1:'연대보증확약서', 2:'연대보증확약서',
  3:'공급물품 목록, 연대보증약정, 채권양수도계약',
  4:'공급물품 목록, 연대보증약정, 채권양수도계약',
  5:'요율표', 6:'요율표',
  7:'판매장려금 지급 기준', 8:'판촉비 지원 기준',
  9:'관련 서류', 10:'관련 서류',
};

const DEPT_CONFIG = {
  '법무':       {pin:'1111',filter:'법무'},
  '자금·회계':  {pin:'2222',filter:'자금·회계'},
  '인사':       {pin:'3333',filter:'인사'},
  '전체관리자': {pin:'0000',filter:null},
};

let currentDept = null;
let selectedDept = null;
let allData = [];
let filteredData = [];
let currentContractTab = '전체';

// ── 탭 전환 ────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(tab==='request'&&i===0)||(tab==='history'&&i===1)));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='history' && !currentDept) {
    document.getElementById('pin-overlay').classList.remove('hidden');
  } else if(tab==='history' && currentDept) {
    loadData();
  }
}

// ── 로그인 ─────────────────────────────────────────────────
function selectDept(dept) {
  selectedDept = dept;
  document.getElementById('dept-btns').style.display = 'none';
  document.getElementById('pin-input-wrap').style.display = 'block';
  document.getElementById('pin-desc').textContent = dept + ' PIN을 입력하세요';
  document.getElementById('pin-input').focus();
  document.getElementById('pin-error').textContent = '';
}

function backToDept() {
  selectedDept = null;
  document.getElementById('dept-btns').style.display = 'flex';
  document.getElementById('pin-input-wrap').style.display = 'none';
  document.getElementById('pin-desc').textContent = '부서를 선택해 주세요';
  document.getElementById('pin-input').value = '';
}

function doLogin() {
  const pin = document.getElementById('pin-input').value;
  if(pin === DEPT_CONFIG[selectedDept].pin) {
    currentDept = selectedDept;
    document.getElementById('pin-overlay').classList.add('hidden');
    document.getElementById('history-content').style.display = 'block';
    const clsMap = {'법무':'badge-legal','자금·회계':'badge-finance','인사':'badge-hr','전체관리자':'badge-admin'};
    const b = document.getElementById('header-badge');
    b.className = 'badge ' + (clsMap[currentDept]||'badge-admin');
    b.textContent = currentDept;
    b.style.display = 'inline-block';
    document.getElementById('logout-btn').style.display = 'inline-block';
    loadData();
  } else {
    document.getElementById('pin-error').textContent = 'PIN이 올바르지 않습니다.';
    document.getElementById('pin-input').value = '';
  }
}

function logout() {
  currentDept = null; selectedDept = null; allData = []; filteredData = [];
  document.getElementById('history-content').style.display = 'none';
  document.getElementById('header-badge').style.display = 'none';
  document.getElementById('logout-btn').style.display = 'none';
  switchTab('request');
  backToDept();
}

function getToday(){return new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\.\s?/g,'-').replace(/-$/,'');}
document.getElementById('req-date').value = getToday();

function updateFields(){
  const tv=parseInt(document.getElementById('contract-type').value);
  const sec=document.getElementById('contract-section');
  const container=document.getElementById('dynamic-fields');
  if(!tv){sec.style.display='none';container.innerHTML='';document.getElementById('attach-section').style.display='none';return;}
  const schema=SCHEMAS[tv];
  sec.style.display='block';
  document.getElementById('contract-section-title').textContent=schema.name+' 입력 항목';
  container.dataset.rows=1;
  renderRows(tv,[{}]);
  const guideEl=document.getElementById('attach-guide-text');
  const attachSec=document.getElementById('attach-section');
  if(guideEl) guideEl.textContent=ATTACH_GUIDE[tv]||'견적서, 계약 조건 등';
  if(attachSec) attachSec.style.display='block';
}

// 행 추가 허용 계약서 종류
const ROW_ADD_ALLOWED = [7, 8, 9, 10];

function saveRowData(tv){
  const schema=SCHEMAS[tv];
  const visible=schema.fields.filter(f=>!f.auto);
  const container=document.getElementById('dynamic-fields');
  const rowCount=parseInt(container.dataset.rows||1);
  const saved=[];
  for(let r=0;r<rowCount;r++){
    const rowData={};
    visible.forEach(f=>{
      const el=document.getElementById(`cf-${r}-${f.col}`);
      if(el) rowData[f.col]=el.value;
    });
    saved.push(rowData);
  }
  return saved;
}

function renderRows(tv, savedData){
  const schema=SCHEMAS[tv];
  const visible=schema.fields.filter(f=>!f.auto);
  const container=document.getElementById('dynamic-fields');
  const rowCount=parseInt(container.dataset.rows||1);
  const allowAdd=ROW_ADD_ALLOWED.includes(tv);
  let html='';
  for(let r=0;r<rowCount;r++){
    html+=`<div class="contract-row" style="grid-column:1/-1;background:var(--bg);border-radius:var(--r);padding:14px;margin-bottom:4px;display:grid;grid-template-columns:1fr 1fr;gap:10px;position:relative">`;
    if(rowCount>1) html+=`<button onclick="removeRow(this,${r})" style="position:absolute;top:8px;right:8px;border:none;background:none;cursor:pointer;color:var(--sub);font-size:18px;line-height:1" title="이 행 삭제">×</button>`;
    if(r>0) html+=`<div style="grid-column:1/-1;font-size:11px;font-weight:700;color:var(--sub);margin-bottom:4px">추가 건 ${r+1}</div>`;
    for(let i=0;i<visible.length;i+=2){
      const f1=visible[i],f2=visible[i+1];
      const v1=savedData&&savedData[r]?savedData[r][f1.col]||'':'';
      const v2=f2&&savedData&&savedData[r]?savedData[r][f2.col]||'':'';
      html+=`<div class="field"><label>${f1.label}${f1.req?' <span class="req">*</span>':''}</label><input type="${f1.type||'text'}" id="cf-${r}-${f1.col}" data-row="${r}" data-col="${f1.col}" value="${v1}" ${f1.master?`oninput="syncKeyRow(this,${tv})"`:''} class="contract-input"></div>`;
      html+=f2?`<div class="field"><label>${f2.label}${f2.req?' <span class="req">*</span>':''}</label><input type="${f2.type||'text'}" id="cf-${r}-${f2.col}" data-row="${r}" data-col="${f2.col}" value="${v2}" ${f2.master?`oninput="syncKeyRow(this,${tv})"`:''} class="contract-input"></div>`:`<div></div>`;
    }
    html+='</div>';
  }
  if(allowAdd){
    html+=`<div style="grid-column:1/-1"><button onclick="addRow()" class="btn-sm" style="width:100%;border-style:dashed;margin-top:4px">+ 행 추가 (동일 계약서 추가 건)</button></div>`;
  }
  container.innerHTML=html;
  container.dataset.rows=rowCount;
}

function addRow(){
  const tv=parseInt(document.getElementById('contract-type').value);
  if(!tv)return;
  const container=document.getElementById('dynamic-fields');
  const saved=saveRowData(tv);
  saved.push({});
  container.dataset.rows=saved.length;
  renderRows(tv,saved);
}

function removeRow(btn,removeIdx){
  const tv=parseInt(document.getElementById('contract-type').value);
  const container=document.getElementById('dynamic-fields');
  const saved=saveRowData(tv);
  saved.splice(removeIdx,1);
  container.dataset.rows=Math.max(1,saved.length);
  renderRows(tv,saved);
}

function syncKeyRow(srcEl,tv){
  const srcRow=parseInt(srcEl.dataset.row);
  const srcCol=parseInt(srcEl.dataset.col);
  const schema=SCHEMAS[tv];
  const mf=schema.fields.find(f=>f.col===srcCol);
  if(!mf)return;
  schema.fields.forEach(f=>{if(f.key===mf.key){const el=document.getElementById(`cf-${srcRow}-${f.col}`);if(el)el.value=srcEl.value;}});
}



function showError(msg){
  const e=document.getElementById('alert-error');
  document.getElementById('error-text').textContent=msg;
  e.style.display='block';setTimeout(()=>e.style.display='none',4500);
}

function buildExcelRow(tv,colData){
  const headers=EXCEL_HEADERS[tv];
  const row=new Array(headers.length).fill('');
  row[headers.length-1]='kor';
  SCHEMAS[tv].fields.forEach(f=>{if(f.col<headers.length-1)row[f.col]=colData[f.col]||'';});
  return row;
}

function submitRequest(){
  const tv=parseInt(document.getElementById('contract-type').value);
  if(!tv){showError('계약서 종류를 선택해주세요.');return;}
  const depts=['legal','finance','hr'].filter(d=>document.getElementById('cb-'+d).checked).map(d=>document.getElementById('cb-'+d).value);
  if(!depts.length){showError('요청 대상 부서를 하나 이상 선택해주세요.');return;}
  const name=document.getElementById('req-name').value.trim();
  const dept=document.getElementById('req-dept').value.trim();
  if(!name){showError('요청자 성명을 입력해주세요.');document.getElementById('req-name').style.borderColor='#dc2626';return;}
  if(!dept){showError('부서를 입력해주세요.');document.getElementById('req-dept').style.borderColor='#dc2626';return;}
  const schema=SCHEMAS[tv];
  const allRequests=[];
  // 실제 DOM에 있는 행 수 확인
  const actualRows = document.querySelectorAll('.contract-row').length || 1;
  for(let r=0;r<actualRows;r++){
    for(const f of schema.fields.filter(fi=>!fi.auto)){
      const el=document.getElementById(`cf-${r}-${f.col}`);
      if(el&&!el.value.trim()){
        showError((r>0?`추가 건 ${r+1} - `:'')+f.label+'을(를) 입력해주세요.');
        el.focus();el.style.borderColor='#dc2626';
        el.addEventListener('input',()=>el.style.borderColor='',{once:true});return;
      }
    }
    const colData={};
    schema.fields.filter(f=>!f.auto).forEach(f=>{const el=document.getElementById(`cf-${r}-${f.col}`);if(el)colData[f.col]=el.value.trim();});
    schema.fields.filter(f=>f.auto).forEach(f=>{const master=schema.fields.find(m=>m.key===f.key&&m.master);if(master)colData[f.col]=colData[master.col]||'';});
    allRequests.push({id:Date.now()+r,timestamp:new Date().toLocaleString('ko-KR'),name,dept,depts,contractType:tv,contractName:schema.name,colData,headers:EXCEL_HEADERS[tv],excelRow:buildExcelRow(tv,colData)});
  }
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent=`${allRequests.length}건 제출 중...`;
  Promise.all(allRequests.map(req=>fetch(WEBAPP_URL,{method:'POST',body:JSON.stringify(req)}).then(res=>res.json())))
  .then(results=>{
    const failed=results.filter(d=>d.result!=='success');
    if(!failed.length){
      document.getElementById('alert-success').style.display='block';
      document.getElementById('alert-success').textContent=`✅ ${allRequests.length}건이 성공적으로 제출되었습니다!`;
      setTimeout(()=>document.getElementById('alert-success').style.display='none',5000);
      resetForm();
    } else showError(`일부 저장 실패 (${failed.length}건)`);
  })
  .catch(()=>showError('네트워크 오류가 발생했습니다.'))
  .finally(()=>{btn.disabled=false;btn.textContent='요청 제출 →';});
}

function resetForm(){
  document.getElementById('contract-type').value='';
  document.getElementById('req-name').value='';
  document.getElementById('req-dept').value='';
  ['legal','finance','hr'].forEach(d=>document.getElementById('cb-'+d).checked=false);
  document.getElementById('contract-section').style.display='none';
  document.getElementById('dynamic-fields').innerHTML='';
  document.getElementById('req-date').value=getToday();
  const attachSec=document.getElementById('attach-section');
  if(attachSec) attachSec.style.display='none';
  const container=document.getElementById('dynamic-fields');
  if(container) container.dataset.rows=1;
  document.getElementById('req-name').style.borderColor='';
  document.getElementById('req-dept').style.borderColor='';
}

// ── 이력 조회 ──────────────────────────────────────────────
function loadData(){
  document.getElementById('loading-state').style.display='block';
  document.getElementById('empty-state').style.display='none';
  document.getElementById('table-body').innerHTML='';
  fetch(WEBAPP_URL+'?action=getData')
  .then(res=>res.json())
  .then(json=>{
    if(json.result==='success'){
      allData=json.data.filter(r=>r['_sheet']!=='요청이력_총괄'&&r['_sheet']!=='시트1');
      document.getElementById('loading-state').style.display='none';
      buildContractTabs();
      applyFilter();
    } else document.getElementById('loading-state').textContent='⚠️ 오류: '+json.error;
  })
  .catch(()=>{document.getElementById('loading-state').textContent='⚠️ 데이터를 불러올 수 없습니다.';});
}

function buildContractTabs(){
  const deptFilter=DEPT_CONFIG[currentDept]?.filter;
  const base=deptFilter?allData.filter(r=>(r['검토요청부서']||'').includes(deptFilter)):allData;
  const contracts=['전체',...new Set(base.map(r=>r['_sheet']).filter(Boolean))];
  document.getElementById('contract-tabs').innerHTML=contracts.map(c=>`<button class="contract-tab ${c===currentContractTab?'active':''}" onclick="setContractTab('${c}')">${c}</button>`).join('');
}

function setContractTab(c){currentContractTab=c;buildContractTabs();applyFilter();}

function applyFilter(){
  const deptFilter=DEPT_CONFIG[currentDept]?.filter;
  const fStatus=document.getElementById('f-status').value;
  const fName=document.getElementById('f-name').value.trim().toLowerCase();
  const fCompany=document.getElementById('f-company').value.trim().toLowerCase();
  filteredData=allData.filter(r=>{
    if(deptFilter&&!(r['검토요청부서']||'').includes(deptFilter))return false;
    if(currentContractTab!=='전체'&&r['_sheet']!==currentContractTab)return false;
    if(fStatus&&r['현재상태']!==fStatus)return false;
    if(fName&&!(r['요청자']||'').toLowerCase().includes(fName))return false;
    if(fCompany){const co=(r['거래처명']||r['거래처명(2)']||'').toLowerCase();if(!co.includes(fCompany))return false;}
    return true;
  });
  renderTable(filteredData);
  updateStats(filteredData);
}

function resetFilter(){
  document.getElementById('f-status').value='';
  document.getElementById('f-name').value='';
  document.getElementById('f-company').value='';
  applyFilter();
}

function renderTable(data){
  const tbody=document.getElementById('table-body');
  const empty=document.getElementById('empty-state');
  const chkAll=document.getElementById('chk-all');
  if(chkAll)chkAll.checked=false;
  document.getElementById('result-count').textContent='총 '+data.length+'건';
  if(!data.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  const statuses=['발송요청','발송완료','체결완료'];
  tbody.innerHTML=data.map((r,idx)=>{
    const status=r['현재상태']||'발송요청';
    const opts=statuses.map(s=>`<option value="${s}" ${s===status?'selected':''}>${s}</option>`).join('');
    const signer=r['서명자명']||'-';
    const company=r['거래처명']||r['거래처명(2)']||'-';
    return `<tr>
      <td style="text-align:center"><input type="checkbox" class="row-chk" data-idx="${idx}" style="cursor:pointer;accent-color:var(--primary)"></td>
      <td style="color:var(--sub);font-size:11px">${(r['요청일시']||'').toString().substring(0,16)}</td>
      <td>${r['요청자']||'-'}</td><td>${r['요청부서']||'-'}</td><td>${r['검토요청부서']||'-'}</td>
      <td>${r['_sheet']||'-'}</td><td>${company}</td><td>${signer}</td>
      <td><select class="status-select status-${status}" onchange="updateStatus(this,'${r['_sheet']}',${r['_row']})">${opts}</select></td>
      <td><button class="btn-sm" onclick="showDetail(${idx})" style="font-size:11px;padding:4px 8px">상세</button></td>
    </tr>`;
  }).join('');
}

function updateStats(data){
  document.getElementById('stat-total').textContent=data.length;
  document.getElementById('stat-s1').textContent=data.filter(r=>r['현재상태']==='발송요청').length;
  document.getElementById('stat-s2').textContent=data.filter(r=>r['현재상태']==='발송완료').length;
  document.getElementById('stat-s3').textContent=data.filter(r=>r['현재상태']==='체결완료').length;
}

function toggleAll(src){document.querySelectorAll('.row-chk').forEach(c=>c.checked=src.checked);}

function updateStatus(sel,sheet,row){
  const status=sel.value;
  sel.className='status-select status-'+status;
  fetch(`${WEBAPP_URL}?action=updateStatus&sheet=${encodeURIComponent(sheet)}&row=${row}&status=${encodeURIComponent(status)}`)
  .then(res=>res.json())
  .then(json=>{
    if(json.result==='success'){const r=filteredData.find(x=>x['_sheet']===sheet&&x['_row']===row);if(r)r['현재상태']=status;updateStats(filteredData);}
    else alert('상태 업데이트 실패');
  })
  .catch(()=>alert('네트워크 오류'));
}

function showDetail(idx){
  const r=filteredData[idx];
  document.getElementById('modal-title').textContent=(r['_sheet']||'')+(r['거래처명']?' - '+r['거래처명']:'');
  const skip=['_sheet','_row'];
  document.getElementById('modal-body').innerHTML=Object.entries(r).filter(([k])=>!skip.includes(k)).map(([k,v])=>`<div class="detail-item"><div class="detail-label">${k}</div><div class="detail-value">${v||'-'}</div></div>`).join('');
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal(){document.getElementById('modal-overlay').classList.add('hidden');}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

const SKIP_COLS=['요청일시','요청자','요청부서','검토요청부서','현재상태','_sheet','_row'];
function formatVal(v){
  if(!v && v!==0) return '';
  const s = String(v);
  // ISO 날짜 형식 변환 (2026-06-02T15:00:00.000Z → 20260602)
  if(/^\d{4}-\d{2}-\d{2}T/.test(s)){
    return s.substring(0,10).replace(/-/g,'');
  }
  // 일반 날짜 형식 변환 (2026-06-02 → 20260602)
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)){
    return s.replace(/-/g,'');
  }
  return s;
}

function buildExcelWb(data){
  const wb=XLSX.utils.book_new();
  const bySheet={};
  data.forEach(r=>{const s=r['_sheet']||'기타';if(!bySheet[s])bySheet[s]=[];bySheet[s].push(r);});
  Object.entries(bySheet).forEach(([sn,rows])=>{
    const headers=Object.keys(rows[0]).filter(k=>!SKIP_COLS.includes(k));
    const excelRows=rows.map(r=>headers.map(h=>formatVal(r[h])));
    const ws=XLSX.utils.aoa_to_sheet([headers,...excelRows]);
    // 전체 셀 텍스트 형식 적용
    const range=XLSX.utils.decode_range(ws['!ref']||'A1');
    for(let R=range.s.r;R<=range.e.r;R++){
      for(let C=range.s.c;C<=range.e.c;C++){
        const addr=XLSX.utils.encode_cell({r:R,c:C});
        if(ws[addr]){
          ws[addr].t='s';
          if(ws[addr].v!==undefined) ws[addr].v=String(ws[addr].v);
        }
      }
    }
    XLSX.utils.book_append_sheet(wb,ws,sn.substring(0,31));
  });
  return wb;
}
function deleteSelected(){
  const idxs=[...document.querySelectorAll('.row-chk:checked')].map(c=>parseInt(c.dataset.idx));
  if(!idxs.length){alert('삭제할 항목을 선택해 주세요.');return;}
  if(!confirm(`선택한 ${idxs.length}건을 삭제하시겠습니까?\n(구글 시트에서도 삭제됩니다)`))return;
  const targets=idxs.map(i=>filteredData[i]).filter(Boolean);
  Promise.all(targets.map(r=>
    fetch(`${WEBAPP_URL}?action=deleteRow&sheet=${encodeURIComponent(r['_sheet'])}&row=${r['_row']}`)
    .then(res=>res.json())
  ))
  .then(()=>{alert(`${targets.length}건이 삭제되었습니다.`);loadData();})
  .catch(()=>alert('삭제 중 오류가 발생했습니다.'));
}

function exportSelected(){
  const idxs=[...document.querySelectorAll('.row-chk:checked')].map(c=>parseInt(c.dataset.idx));
  if(!idxs.length){alert('출력할 항목을 선택해 주세요.');return;}
  const data=idxs.map(i=>filteredData[i]).filter(Boolean);
  const now=new Date().toLocaleDateString('ko-KR').replace(/\.\s?/g,'-').replace(/-$/,'');
  XLSX.writeFile(buildExcelWb(data),`전자계약이력_선택_${now}.xlsx`);
}
function exportAll(){
  if(!filteredData.length){alert('출력할 데이터가 없습니다.');return;}
  const now=new Date().toLocaleDateString('ko-KR').replace(/\.\s?/g,'-').replace(/-$/,'');
  XLSX.writeFile(buildExcelWb(filteredData),`전자계약이력_전체_${now}.xlsx`);
}
</script>
