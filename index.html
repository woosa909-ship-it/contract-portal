<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전자계약 이력 조회</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f7;--surface:#fff;--border:#e2e5ea;--focus:#4a7cdc;
  --text:#1a1d23;--sub:#6b7280;--hint:#9ca3af;
  --primary:#1e50c8;--primary-h:#1840a8;--danger:#dc2626;
  --success-bg:#ecfdf5;--success-bd:#6ee7b7;--success-tx:#065f46;
  --legal-bg:#eff6ff;--legal-tx:#1d4ed8;--legal-bd:#bfdbfe;
  --finance-bg:#f0fdf4;--finance-tx:#15803d;--finance-bd:#bbf7d0;
  --hr-bg:#fdf4ff;--hr-tx:#7e22ce;--hr-bd:#e9d5ff;
  --r:8px;--rl:12px;
}
html,body{font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.logo{font-size:16px;font-weight:700}.logo span{color:var(--primary)}
.btn-sm{padding:5px 12px;font-size:12px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);cursor:pointer;color:var(--text);font-family:inherit}
.btn-sm:hover{background:var(--bg)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-h)}
.btn-danger{color:var(--danger);border-color:#fca5a5}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-legal{background:var(--legal-bg);color:var(--legal-tx);border:1px solid var(--legal-bd)}
.badge-finance{background:var(--finance-bg);color:var(--finance-tx);border:1px solid var(--finance-bd)}
.badge-hr{background:var(--hr-bg);color:var(--hr-tx);border:1px solid var(--hr-bd)}
.badge-admin{background:#1e293b;color:#fff}

/* 로그인 */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:36px 32px;width:360px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.login-card h2{font-size:18px;font-weight:700;margin-bottom:6px}
.login-card p{font-size:13px;color:var(--sub);margin-bottom:24px}
.dept-btn-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.dept-login-btn{padding:12px;font-size:14px;font-weight:500;border-radius:var(--r);border:1px solid;cursor:pointer;font-family:inherit;transition:all .15s}
.dept-login-btn.legal{background:var(--legal-bg);color:var(--legal-tx);border-color:var(--legal-bd)}
.dept-login-btn.finance{background:var(--finance-bg);color:var(--finance-tx);border-color:var(--finance-bd)}
.dept-login-btn.hr{background:var(--hr-bg);color:var(--hr-tx);border-color:var(--hr-bd)}
.dept-login-btn.admin{background:#1e293b;color:#fff;border-color:#1e293b}
.pin-wrap{display:none}
.pin-input{width:100%;padding:10px;font-size:18px;text-align:center;letter-spacing:.4em;border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;font-family:inherit;outline:none}
.pin-input:focus{border-color:var(--primary)}
.pin-confirm{width:100%;padding:10px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.pin-error{color:var(--danger);font-size:12px;margin-top:8px;min-height:18px}
.back-btn{background:none;border:none;color:var(--sub);cursor:pointer;font-size:13px;margin-top:8px;font-family:inherit}

/* 메인 */
.main{padding:24px;max-width:1200px;margin:0 auto}
.section{margin-bottom:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px}
.stat-label{font-size:11px;color:var(--sub);margin-bottom:4px;font-weight:500}
.stat-value{font-size:24px;font-weight:700}

/* 탭 */
.tab-nav{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tab-btn-dept{padding:8px 16px;font-size:13px;font-weight:500;border-radius:20px;border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--sub);font-family:inherit;transition:all .15s}
.tab-btn-dept.active-legal{background:var(--legal-bg);color:var(--legal-tx);border-color:var(--legal-bd)}
.tab-btn-dept.active-finance{background:var(--finance-bg);color:var(--finance-tx);border-color:var(--finance-bd)}
.tab-btn-dept.active-hr{background:var(--hr-bg);color:var(--hr-tx);border-color:var(--hr-bd)}
.tab-btn-dept.active-all{background:#1e293b;color:#fff;border-color:#1e293b}

/* 필터 */
.filter-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px;margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-label{font-size:11px;color:var(--sub);font-weight:500}
.filter-wrap select,.filter-wrap input{padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--r);font-family:inherit;outline:none;background:var(--surface);color:var(--text)}
.filter-wrap select:focus,.filter-wrap input:focus{border-color:var(--primary)}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.toolbar-left{display:flex;align-items:center;gap:8px}
.toolbar-right{display:flex;gap:8px}

/* 테이블 */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:900px}
thead tr{background:var(--bg);border-bottom:2px solid var(--border)}
th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--sub);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f8faff}
td{padding:11px 14px;vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}

/* 상태 */
.status-select{font-size:11px;padding:4px 8px;border-radius:20px;border:1px solid;cursor:pointer;font-family:inherit;font-weight:500;outline:none}
.status-발송요청{background:#fef9c3;color:#854d0e;border-color:#fde047}
.status-발송완료{background:var(--legal-bg);color:var(--legal-tx);border-color:var(--legal-bd)}
.status-체결완료{background:var(--success-bg);color:var(--success-tx);border-color:var(--success-bd)}

.empty{padding:48px;text-align:center;color:var(--hint);font-size:13px}
.loading{padding:48px;text-align:center;color:var(--sub);font-size:13px}

/* 상세 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border-radius:var(--rl);padding:28px;width:600px;max-width:90vw;max-height:85vh;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700}
.modal-close{border:none;background:none;cursor:pointer;font-size:20px;color:var(--sub);line-height:1}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-item{display:flex;flex-direction:column;gap:3px}
.detail-label{font-size:11px;color:var(--sub);font-weight:500}
.detail-value{font-size:13px;color:var(--text);padding:6px 10px;background:var(--bg);border-radius:var(--r)}
</style>
</head>
<body>

<!-- 로그인 -->
<div class="login-wrap" id="login-page">
  <div class="login-card">
    <div style="font-size:36px;margin-bottom:12px">🔐</div>
    <h2>전자계약 이력 조회</h2>
    <p id="login-desc">부서를 선택해 주세요</p>
    <div class="dept-btn-wrap" id="dept-btns">
      <button class="dept-login-btn legal" onclick="selectDept('법무')">⚖️ 법무팀</button>
      <button class="dept-login-btn finance" onclick="selectDept('자금·회계')">💰 자금·회계팀</button>
      <button class="dept-login-btn hr" onclick="selectDept('인사')">👥 인사팀</button>
      <button class="dept-login-btn admin" onclick="selectDept('전체관리자')">🛡️ 전체 관리자</button>
    </div>
    <div class="pin-wrap" id="pin-wrap">
      <input class="pin-input" type="password" id="pin-input" maxlength="6" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="pin-confirm" onclick="doLogin()">로그인</button>
      <div class="pin-error" id="pin-error"></div>
      <button class="back-btn" onclick="backToDept()">← 부서 선택으로</button>
    </div>
  </div>
</div>

<!-- 메인 -->
<div id="main-page" style="display:none">
  <div class="header">
    <div class="logo">전자계약 <span>이력 조회</span></div>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="header-badge" class="badge"></span>
      <button class="btn-sm" onclick="logout()">로그아웃</button>
    </div>
  </div>
  <div class="main">
    <div class="stats">
      <div class="stat-card"><div class="stat-label">전체 요청</div><div class="stat-value" id="stat-total">-</div></div>
      <div class="stat-card"><div class="stat-label">발송요청</div><div class="stat-value" id="stat-s1" style="color:#854d0e">-</div></div>
      <div class="stat-card"><div class="stat-label">발송완료</div><div class="stat-value" id="stat-s2" style="color:var(--legal-tx)">-</div></div>
      <div class="stat-card"><div class="stat-label">체결완료</div><div class="stat-value" id="stat-s3" style="color:var(--success-tx)">-</div></div>
    </div>

    <!-- 부서 탭 (전체관리자만) -->
    <div id="dept-tab-wrap" class="tab-nav" style="display:none"></div>

    <!-- 계약서 종류 탭 -->
    <div id="contract-tab-wrap" class="tab-nav"></div>

    <!-- 필터 -->
    <div class="filter-wrap">
      <div class="filter-group">
        <div class="filter-label">현재상태</div>
        <select id="filter-status" onchange="applyFilter()">
          <option value="">전체</option>
          <option>발송요청</option>
          <option>발송완료</option>
          <option>체결완료</option>
        </select>
      </div>
      <div class="filter-group">
        <div class="filter-label">요청자</div>
        <input type="text" id="filter-name" placeholder="이름 검색" oninput="applyFilter()" style="width:110px">
      </div>
      <div class="filter-group">
        <div class="filter-label">거래처명</div>
        <input type="text" id="filter-company" placeholder="거래처 검색" oninput="applyFilter()" style="width:130px">
      </div>
      <div class="filter-group">
        <div class="filter-label">기간</div>
        <input type="date" id="filter-date-from" onchange="applyFilter()" style="width:130px">
      </div>
      <div class="filter-group">
        <div class="filter-label">&nbsp;</div>
        <input type="date" id="filter-date-to" onchange="applyFilter()" style="width:130px">
      </div>
      <button class="btn-sm" onclick="resetFilter()" style="align-self:flex-end">초기화</button>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <span style="font-size:15px;font-weight:700">요청 이력</span>
        <span id="result-count" style="font-size:12px;color:var(--sub)"></span>
      </div>
      <div class="toolbar-right">
        <button class="btn-sm btn-primary" onclick="exportSelected()">☑️ 선택 엑셀 출력</button>
        <button class="btn-sm" onclick="exportExcel()">📊 전체 엑셀 출력</button>
        <button class="btn-sm" onclick="loadData()">🔄 새로고침</button>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th style="width:36px;text-align:center"><input type="checkbox" id="chk-all" onclick="toggleAll(this)" style="cursor:pointer;accent-color:var(--primary)"></th>
            <th>요청일시</th>
            <th>요청자</th>
            <th>요청부서</th>
            <th>검토요청부서</th>
            <th>계약서 종류</th>
            <th>거래처명</th>
            <th>서명자명</th>
            <th>현재상태</th>
            <th>상세</th>
          </tr></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div class="loading" id="loading">데이터를 불러오는 중...</div>
      <div class="empty" id="empty" style="display:none">📭 조회된 이력이 없습니다</div>
    </div>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">상세 정보</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body" class="detail-grid"></div>
  </div>
</div>

<script>
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxAMJfvfBs_IberixDPkJKsKvwmLNAa1fwxEU8lPMxmMwKUj2Zk5KeZ4njFbDQgevam/exec';

const DEPT_CONFIG = {
  '법무':       { pin:'1111', filter:'법무' },
  '자금·회계':  { pin:'2222', filter:'자금·회계' },
  '인사':       { pin:'3333', filter:'인사' },
  '전체관리자': { pin:'0000', filter:null },
};

let currentDept = null;
let selectedDept = null;
let allData = [];
let filteredData = [];
let currentContractTab = '전체';
let currentDeptTab = '전체';

// ── 로그인 ─────────────────────────────────────────────────
function selectDept(dept) {
  selectedDept = dept;
  document.getElementById('dept-btns').style.display = 'none';
  document.getElementById('pin-wrap').style.display = 'block';
  document.getElementById('login-desc').textContent = dept + ' PIN을 입력하세요';
  document.getElementById('pin-input').focus();
  document.getElementById('pin-error').textContent = '';
}

function backToDept() {
  selectedDept = null;
  document.getElementById('dept-btns').style.display = 'flex';
  document.getElementById('pin-wrap').style.display = 'none';
  document.getElementById('login-desc').textContent = '부서를 선택해 주세요';
  document.getElementById('pin-input').value = '';
}

function doLogin() {
  const pin = document.getElementById('pin-input').value;
  const config = DEPT_CONFIG[selectedDept];
  if (pin === config.pin) {
    currentDept = selectedDept;
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('main-page').style.display = 'block';
    const clsMap = {'법무':'badge-legal','자금·회계':'badge-finance','인사':'badge-hr','전체관리자':'badge-admin'};
    const b = document.getElementById('header-badge');
    b.className = 'badge ' + (clsMap[currentDept]||'badge-admin');
    b.textContent = currentDept;
    if (currentDept === '전체관리자') {
      document.getElementById('dept-tab-wrap').style.display = 'flex';
    }
    loadData();
  } else {
    document.getElementById('pin-error').textContent = 'PIN이 올바르지 않습니다.';
    document.getElementById('pin-input').value = '';
  }
}

function logout() {
  currentDept = null; selectedDept = null; allData = []; filteredData = [];
  document.getElementById('main-page').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('pin-input').value = '';
  backToDept();
}

// ── 데이터 로드 ────────────────────────────────────────────
function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('empty').style.display = 'none';
  document.getElementById('table-body').innerHTML = '';

  fetch(WEBAPP_URL + '?action=getData')
  .then(res => res.json())
  .then(json => {
    if (json.result === 'success') {
      allData = json.data;
      document.getElementById('loading').style.display = 'none';
      buildTabs();
      applyFilter();
    } else {
      document.getElementById('loading').textContent = '⚠️ 오류: ' + json.error;
    }
  })
  .catch(() => {
    document.getElementById('loading').textContent = '⚠️ 데이터를 불러올 수 없습니다.';
  });
}

// ── 탭 생성 ────────────────────────────────────────────────
function buildTabs() {
  // 부서 탭 (전체관리자만)
  if (currentDept === '전체관리자') {
    const deptFilter = DEPT_CONFIG[currentDept]?.filter;
    const myData = deptFilter ? allData.filter(r => (r['검토요청부서']||'').includes(deptFilter)) : allData;
    const depts = ['전체', ...new Set(myData.map(r => r['검토요청부서']).filter(Boolean).join(', ').split(', ').filter(Boolean))];
    const wrap = document.getElementById('dept-tab-wrap');
    wrap.innerHTML = depts.map(d => `<button class="tab-btn-dept ${d===currentDeptTab?'active-all':''}" onclick="setDeptTab('${d}')">${d}</button>`).join('');
  }

  // 계약서 종류 탭
  const deptFilter = DEPT_CONFIG[currentDept]?.filter;
  let baseData = deptFilter ? allData.filter(r => (r['검토요청부서']||'').includes(deptFilter)) : allData;
  if (currentDept === '전체관리자' && currentDeptTab !== '전체') {
    baseData = baseData.filter(r => (r['검토요청부서']||'').includes(currentDeptTab));
  }
  const contracts = ['전체', ...new Set(baseData.map(r => r['_sheet']).filter(Boolean))];
  const wrap = document.getElementById('contract-tab-wrap');
  wrap.innerHTML = contracts.map(c => `<button class="tab-btn-dept ${c===currentContractTab?'active-all':''}" style="font-size:12px" onclick="setContractTab('${c}')">${c}</button>`).join('');
}

function setDeptTab(dept) {
  currentDeptTab = dept;
  currentContractTab = '전체';
  buildTabs();
  applyFilter();
}

function setContractTab(contract) {
  currentContractTab = contract;
  buildTabs();
  applyFilter();
}

// ── 필터 ────────────────────────────────────────────────────
function applyFilter() {
  const deptFilter = DEPT_CONFIG[currentDept]?.filter;
  const filterStatus  = document.getElementById('filter-status').value;
  const filterName    = document.getElementById('filter-name').value.trim().toLowerCase();
  const filterCompany = document.getElementById('filter-company').value.trim().toLowerCase();
  const filterFrom    = document.getElementById('filter-date-from').value;
  const filterTo      = document.getElementById('filter-date-to').value;

  filteredData = allData.filter(r => {
    // 부서 필터
    if (deptFilter && !(r['검토요청부서']||'').includes(deptFilter)) return false;
    if (currentDept === '전체관리자' && currentDeptTab !== '전체' && !(r['검토요청부서']||'').includes(currentDeptTab)) return false;
    // 계약서 탭
    if (currentContractTab !== '전체' && r['_sheet'] !== currentContractTab) return false;
    // 기타 필터
    if (filterStatus && r['현재상태'] !== filterStatus) return false;
    if (filterName && !(r['요청자']||'').toLowerCase().includes(filterName)) return false;
    if (filterCompany) {
      const company = (r['거래처명'] || r['거래처명(2)'] || '').toLowerCase();
      if (!company.includes(filterCompany)) return false;
    }
    return true;
  });

  renderTable(filteredData);
  updateStats(filteredData);
}

function resetFilter() {
  document.getElementById('filter-status').value = '';
  document.getElementById('filter-name').value = '';
  document.getElementById('filter-company').value = '';
  document.getElementById('filter-date-from').value = '';
  document.getElementById('filter-date-to').value = '';
  applyFilter();
}

// ── 테이블 렌더링 ──────────────────────────────────────────
function renderTable(data) {
  const tbody = document.getElementById('table-body');
  const empty = document.getElementById('empty');
  document.getElementById('result-count').textContent = '총 ' + data.length + '건';
  const chkAll = document.getElementById('chk-all');
  if (chkAll) chkAll.checked = false;

  if (!data.length) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  const statuses = ['발송요청', '발송완료', '체결완료'];
  tbody.innerHTML = data.map((r, idx) => {
    const status = r['현재상태'] || '발송요청';
    const opts = statuses.map(s => `<option value="${s}" ${s===status?'selected':''}>${s}</option>`).join('');
    const signer = r['서명자명'] || '-';
    const company = r['거래처명'] || r['거래처명(2)'] || '-';
    return `<tr>
      <td style="text-align:center"><input type="checkbox" class="row-chk" data-idx="${idx}" style="cursor:pointer;accent-color:var(--primary)"></td>
      <td style="color:var(--sub);font-size:12px">${(r['요청일시']||'').toString().substring(0,16)}</td>
      <td>${r['요청자']||'-'}</td>
      <td>${r['요청부서']||'-'}</td>
      <td>${r['검토요청부서']||'-'}</td>
      <td>${r['_sheet']||'-'}</td>
      <td>${company}</td>
      <td>${signer}</td>
      <td><select class="status-select status-${status}" onchange="updateStatus(this,'${r['_sheet']}',${r['_row']})">${opts}</select></td>
      <td><button class="btn-sm" onclick="showDetail(${idx})" style="font-size:11px">상세</button></td>
    </tr>`;
  }).join('');
}

function updateStats(data) {
  document.getElementById('stat-total').textContent = data.length;
  document.getElementById('stat-s1').textContent = data.filter(r=>r['현재상태']==='발송요청').length;
  document.getElementById('stat-s2').textContent = data.filter(r=>r['현재상태']==='발송완료').length;
  document.getElementById('stat-s3').textContent = data.filter(r=>r['현재상태']==='체결완료').length;
}

// ── 상태 업데이트 ──────────────────────────────────────────
function updateStatus(sel, sheet, row) {
  const status = sel.value;
  sel.className = 'status-select status-' + status;
  fetch(`${WEBAPP_URL}?action=updateStatus&sheet=${encodeURIComponent(sheet)}&row=${row}&status=${encodeURIComponent(status)}`)
  .then(res => res.json())
  .then(json => {
    if (json.result === 'success') {
      const r = filteredData.find(x => x['_sheet'] === sheet && x['_row'] === row);
      if (r) r['현재상태'] = status;
      updateStats(filteredData);
    } else {
      alert('상태 업데이트 실패: ' + json.error);
    }
  })
  .catch(() => alert('네트워크 오류'));
}

// ── 상세보기 ────────────────────────────────────────────────
function showDetail(idx) {
  const r = filteredData[idx];
  document.getElementById('modal-title').textContent = r['_sheet'] + ' - ' + (r['거래처명']||'');
  const skip = ['_sheet','_row'];
  const html = Object.entries(r)
    .filter(([k]) => !skip.includes(k))
    .map(([k,v]) => `<div class="detail-item"><div class="detail-label">${k}</div><div class="detail-value">${v||'-'}</div></div>`)
    .join('');
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}

// ── 체크박스 ───────────────────────────────────────────────
function toggleAll(src) {
  document.querySelectorAll('.row-chk').forEach(c => c.checked = src.checked);
}

function getSelectedData() {
  const idxs = [...document.querySelectorAll('.row-chk:checked')].map(c => parseInt(c.dataset.idx));
  return idxs.map(i => filteredData[i]).filter(Boolean);
}

// ── 엑셀 출력 ──────────────────────────────────────────────
// 계약서별 원본 양식 헤더만 추출 (앞 4개, 현재상태 제외)
const SKIP_COLS = ['요청일시','요청자','요청부서','검토요청부서','현재상태','_sheet','_row'];

function buildExcelData(data) {
  // 계약서 종류별로 그룹화해서 각각 시트로
  const wb = XLSX.utils.book_new();
  const bySheet = {};
  data.forEach(r => {
    const s = r['_sheet'] || '기타';
    if (!bySheet[s]) bySheet[s] = [];
    bySheet[s].push(r);
  });
  Object.entries(bySheet).forEach(([sheetName, rows]) => {
    const headers = Object.keys(rows[0]).filter(k => !SKIP_COLS.includes(k));
    const excelRows = rows.map(r => headers.map(h => r[h]||''));
    const ws = XLSX.utils.aoa_to_sheet([headers, ...excelRows]);
    XLSX.utils.book_append_sheet(wb, ws, sheetName.substring(0, 31));
  });
  return wb;
}

function exportSelected() {
  const selected = getSelectedData();
  if (!selected.length) { alert('출력할 항목을 선택해 주세요.'); return; }
  const wb = buildExcelData(selected);
  const now = new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','');
  XLSX.writeFile(wb, `전자계약이력_선택_${now}.xlsx`);
}

function exportExcel() {
  if (!filteredData.length) { alert('출력할 데이터가 없습니다.'); return; }
  const wb = buildExcelData(filteredData);
  const now = new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','');
  XLSX.writeFile(wb, `전자계약이력_전체_${now}.xlsx`);
}

// 모달 외부 클릭 닫기
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
